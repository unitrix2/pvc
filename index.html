<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVC Calculator - Price Variation Clause</title>
    <meta name="description" content="Calculate Price Variation Clause (PVC) amounts for Indian Railway contracts with proper mathematical formula rendering, PDF export, and persistent data storage.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- KaTeX for mathematical formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <!-- SheetJS with Advanced Styling Support (xlsx-js-style) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <!-- html2pdf.js for PDF export -->
    <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Particle Canvas Background -->
    <canvas id="particle-canvas" class="no-print"></canvas>

    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn no-print" id="mobile-menu-btn" onclick="App.toggleSidebar()">☰</button>

    <div class="app-container">

        <!-- ===== SIDEBAR ===== -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon">⚡</span>
                <h2>PVC Calculator</h2>
            </div>

            <!-- Theme & Color Controls -->
            <div class="theme-controls no-print">
                <button class="mode-toggle-btn" id="mode-toggle-btn" onclick="App.toggleThemeMode()">
                    <span id="theme-mode-icon">☀️</span> <span id="theme-mode-text">Light Mode</span>
                </button>
                <div class="color-palette-selector">
                    <div class="color-dot color-amber active" onclick="App.setThemeColor('amber')" title="Amber"></div>
                    <div class="color-dot color-emerald" onclick="App.setThemeColor('emerald')" title="Emerald"></div>
                    <div class="color-dot color-sapphire" onclick="App.setThemeColor('sapphire')" title="Sapphire"></div>
                    <div class="color-dot color-ruby" onclick="App.setThemeColor('ruby')" title="Ruby"></div>
                    <div class="color-dot color-amethyst" onclick="App.setThemeColor('amethyst')" title="Amethyst"></div>
                    <div class="color-dot color-sunset" onclick="App.setThemeColor('sunset')" title="Sunset"></div>
                </div>
            </div>

            <ul class="nav-links">
                <li><a href="#" class="nav-link active" data-page="dashboard">
                    <span class="nav-icon">📊</span> Dashboard
                </a></li>
                <li><a href="#" class="nav-link" data-page="contracts">
                    <span class="nav-icon">📋</span> Contracts
                </a></li>
                <li><a href="#" class="nav-link" data-page="calculate">
                    <span class="nav-icon">🧮</span> Calculate PVC
                </a></li>
                <li><a href="#" class="nav-link" data-page="data-mgmt">
                    <span class="nav-icon">💾</span> Data Management
                </a></li>
            </ul>

            <!-- Creator Badge -->
            <div class="sidebar-footer no-print">
                <div class="creator-badge">
                    ✨ Created by: Salman
                </div>
            </div>
        </nav>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="main-content" id="main-content">
            <div class="page active" id="page-dashboard"></div>
            <div class="page" id="page-contracts"></div>
            <div class="page" id="page-index-data"></div>
            <div class="page" id="page-calculate"></div>
            <div class="page" id="page-result"></div>
            <div class="page" id="page-data-mgmt"></div>
        </main>

    </div>

    <!-- App Scripts (order matters) -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/formula-renderer.js"></script>
    <script src="js/excel-handler.js"></script>
    <script src="js/pdf-export.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
